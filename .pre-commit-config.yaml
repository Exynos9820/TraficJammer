repos:
- repo: local
  hooks:
    - id: clang-format
      name: clang-format
      entry: clang-format
      language: system
      files: '\.(c|cc|cpp|cxx|h|hpp|hh)$'
      args: ['-i']

- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v4.6.0
  hooks:
    - id: trailing-whitespace
    - id: end-of-file-fixer
    - id: check-yaml
